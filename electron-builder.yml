appId: gov.il.idot.sidecar
productName: IDOT Sidecar
copyright: Copyright © 2025 IDOT

# Entry point (compiled from electron/main.ts)
main: electron/dist/main.js

directories:
  output: release
  buildResources: assets

# Files bundled into the app package
files:
  - electron/dist/**
  - server/dist/**
  - client/dist/**
  - node_modules/**
  - "!node_modules/.cache/**"
  - "!node_modules/**/test/**"
  - "!node_modules/**/*.md"
  - package.json

# Don't use asar so that express.static() can serve client/dist directly
asar: false

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: IDOT Sidecar

mac:
  target: dmg
  category: public.app-category.productivity
