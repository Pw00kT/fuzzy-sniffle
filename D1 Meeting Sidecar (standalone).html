  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"8ae7d361-0f39-4f43-bfee-f89b07cd5097\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n  <style>/* Self-contained DS stylesheet for the standalone Meeting Sidecar bundle.\n   = bundle-sidecar-fonts.css (only shipped faces) + tokens.css with its\n   fonts.css @import stripped, so no non-existent OTF is referenced. */\n\n/* Pruned fonts.css for the standalone Meeting Sidecar bundle.\n   Declares only the faces whose files actually exist in the design\n   system (/fonts): JetBrains Mono + Liberation Serif. The licensed\n   Helvetica Neue LT Pro OTFs are not shipped in this project, so\n   --font-sans already falls back to the Helvetica/Arial stack from\n   tokens.css both live and offline. Dropping the dead @font-face\n   rules changes nothing visually and removes 20 dangling references\n   from the bundle. Paths are relative to the project root. */\n\n@font-face {\n  font-family: \"JetBrains Mono\";\n  src: url(\"d402497e-5e33-4ff1-aba7-f2929ab0a674\") format(\"woff2\");\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  src: url(\"cd71496f-7f1f-461f-9f9a-d2e1b3ec9fd7\") format(\"woff2\");\n  font-weight: 500; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  src: url(\"8893e0bf-47bd-483b-a62d-5a8892a36b99\") format(\"woff2\");\n  font-weight: 700; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"Liberation Serif\";\n  src: url(\"5f925080-8d04-400a-8d7a-51be3c8cef05\") format(\"truetype\");\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n\n\n/* =========================================================\n   IDOT Design System, Design Tokens\n   Anchored to the official IDOT Brand Guidelines:\n     Navy   #002341  Pantone 541 C\n     Orange #F58220  Pantone 144 C\n     Plus 4 supporting Pantones.\n\n   Scale names (Ink / Paper / Signal) are preserved for\n   backwards compatibility; the values are now the canonical\n   hex anchored to the brand-guide palette.\n   ========================================================= */\n\n/* Pull the @font-face closure into the compiler-recognized global\n   root. tokens.css is the canonical global stylesheet the DS\n   compiler reads; importing fonts.css here ensures every declared\n   IDOT face is registered (not only when colors_and_type.css loads). */\n/* fonts.css @import removed for standalone bundle; real faces declared above */\n\n:root {\n  /* ---------- Canonical brand colors (Pantone-anchored) ---------- */\n  --idot-navy:        #002341;  /* Pantone 541 C  · primary \"trust\" */\n  --idot-orange:      #F58220;  /* Pantone 144 C  · primary \"energy\" */\n  --idot-grey:        #E6E7E8;  /* 10% K · supporting neutral */\n\n  /* Supporting Pantones */\n  --idot-cyan:        #00AEEF;  /* Pantone Process Cyan C */\n  --idot-red-orange:  #F05623;  /* Pantone 7579 C */\n  --idot-yellow:      #FCB116;  /* Pantone 124 C */\n  --idot-green:       #97C93D;  /* Pantone 2292 C */\n\n  /* ---------- Ink (navy), primary brand spine ---------- */\n  --ink-50:   #e6ecf3;\n  --ink-100:  #cdd9e6;\n  --ink-200:  #9bb1cc;\n  --ink-300:  #6a8bb3;\n  --ink-400:  #3a6593;\n  --ink-500:  #1a3d5c;   /* navy-2, lighter for hover/links */\n  --ink-600:  #0d3050;\n  --ink-700:  #002341;   /* IDOT Blue · primary brand */\n  --ink-800:  #001a30;\n  --ink-900:  #00121f;\n  --ink-950:  #000913;\n\n  /* ---------- Paper (warm neutrals), surfaces & text ---------- */\n  --paper-0:    #ffffff;\n  --paper-50:   #fafaf7;   /* canvas */\n  --paper-100:  #f3f1ec;   /* recessed surface */\n  --paper-200:  #ebe9e5;   /* subtle dividers */\n  --paper-300:  #d8d6d2;   /* hairline rules */\n  --paper-400:  #b7bABC;   /* placeholder borders */\n  --paper-500:  #8a8a8a;   /* placeholder / disabled */\n  --paper-600:  #5a5a5a;   /* meta / tertiary text */\n  --paper-700:  #2a2a2a;   /* secondary text */\n  --paper-800:  #1a1a1a;\n  --paper-900:  #0a0a0a;   /* primary text */\n\n  /* ---------- Signal (safety orange), reserved accent ---------- */\n  --signal-50:   #fef2e8;\n  --signal-100:  #fce0cb;\n  --signal-300:  #f8ab63;\n  --signal-500:  #F58220;   /* IDOT Orange · the accent */\n  --signal-600:  #e07418;\n  --signal-700:  #b35a10;\n  --signal-900:  #5a2d05;\n\n  /* ---------- Brand-name aliases ----------\n     The token system runs on TWO layers and nothing else:\n\n       (1) CANONICAL technical scale\n           --ink-NNN / --paper-NNN / --signal-NNN\n           This is what components should reach for.\n\n       (2) BRAND aliases\n           --idot-blue-NNN → ink-NNN          (scale step, technical)\n           --idot-orange-NNN → signal-NNN     (scale step, technical)\n           --idot-grey-NN   → K-percent       (brand-spec, the IDOT\n              guide publishes grey as a K-percent ramp\n              10–90 → #E6E7E8 → #19191A; this is what the legacy\n              website + slide templates address)\n           --idot-blue / --idot-orange         (shorthand, no scale)\n           --idot-black / --idot-white         (anchors)\n           --idot-blue-tint-NN / --idot-orange-tint-NN (mix-w-white)\n\n     There is no third \"scale-step grey alias\" — it used to exist\n     (--idot-grey-100…900 → paper-NNN) but the numeric suffix\n     collided with the K-percent ramp (10–90), and the K-percent\n     ramp is the value the brand guide actually publishes. The\n     paper-NNN scale remains available by its technical name; the\n     K-percent ramp owns the --idot-grey-* namespace. */\n  --idot-blue-50:   var(--ink-50);\n  --idot-blue-100:  var(--ink-100);\n  --idot-blue-200:  var(--ink-200);\n  --idot-blue-300:  var(--ink-300);\n  --idot-blue-400:  var(--ink-400);\n  --idot-blue-500:  var(--ink-500);\n  --idot-blue-600:  var(--ink-600);\n  --idot-blue-700:  var(--ink-700);  /* canonical IDOT Blue · Pantone 541 C */\n  --idot-blue-800:  var(--ink-800);\n  --idot-blue-900:  var(--ink-900);\n  --idot-blue-950:  var(--ink-950);\n\n  --idot-orange-50:  var(--signal-50);\n  --idot-orange-100: var(--signal-100);\n  --idot-orange-300: var(--signal-300);\n  --idot-orange-500: var(--signal-500); /* canonical IDOT Orange · Pantone 144 C */\n  --idot-orange-600: var(--signal-600);\n  --idot-orange-700: var(--signal-700);\n  --idot-orange-900: var(--signal-900);\n\n  /* Shorthand + K-percent grey scale (brand-published). */\n  --idot-blue:       var(--ink-700);     /* Pantone 541 C */\n  --idot-grey-0:     #FFFFFF;            /*  0% K */\n  --idot-grey-10:    #E6E7E8;            /* 10% K, the spec \"Grey\" */\n  --idot-grey-20:    #CFD1D3;            /* 20% K */\n  --idot-grey-30:    #B7BABC;            /* 30% K */\n  --idot-grey-40:    #939598;            /* 40% K */\n  --idot-grey-50:    #76787B;            /* 50% K */\n  --idot-grey-60:    #58595B;            /* 60% K */\n  --idot-grey-70:    #404042;            /* 70% K */\n  --idot-grey-80:    #2A2A2C;            /* 80% K */\n  --idot-grey-90:    #19191A;            /* 90% K */\n  --idot-grey-100:   #000000;            /* 100% K */\n\n  /* ---------- Pure black / white anchors ----------\n     The brand guide names \"Black\" and \"White\" as palette\n     members alongside Blue, Orange, and the grey ramp. */\n  --idot-black:      #000000;\n  --idot-white:      #FFFFFF;\n\n  /* ---------- Brand tint scales (5-step + 100) ----------\n     Mix of brand color with white, per the brand guide's\n     \"tints of primary and supporting palettes are explicitly\n     allowed\" provision. Suffixed `-tint-NN` so they do not\n     collide with the ink/signal scale-step aliases above. */\n  --idot-blue-tint-90:   #1a3a55;\n  --idot-blue-tint-75:   #405a72;\n  --idot-blue-tint-50:   #80919f;\n  --idot-blue-tint-25:   #bfc7cf;\n  --idot-blue-tint-10:   #e5e8eb;\n\n  --idot-orange-tint-90: #f68f36;\n  --idot-orange-tint-75: #f8ab63;\n  --idot-orange-tint-50: #fac18f;\n  --idot-orange-tint-25: #fce0cb;\n  --idot-orange-tint-10: #fef2e8;\n\n  /* ---------- Status (supporting Pantones) ---------- */\n  --success-100: #eaf5d3;\n  --success-500: #97C93D;   /* Pantone 2292 C */\n  --success-700: #4f7a17;\n\n  --warning-100: #fef0d0;\n  --warning-500: #FCB116;   /* Pantone 124 C */\n  --warning-700: #8a5a00;\n\n  --danger-100:  #fde0d4;\n  --danger-500:  #F05623;   /* Pantone 7579 C */\n  --danger-700:  #8a2a0c;\n\n  --info-100:    #cceffc;\n  --info-500:    #00AEEF;   /* Pantone Process Cyan C */\n  --info-700:    #006a92;\n\n  /* ---------- Semantic role tokens (light) ---------- */\n  --bg-canvas:      var(--paper-50);\n  --bg-surface:     var(--paper-0);\n  --bg-sunken:      var(--paper-100);\n  --bg-inverse:     var(--ink-700);    /* IDOT navy as the inverse surface */\n  --bg-brand:       var(--ink-700);    /* primary CTA / brand surfaces */\n  --bg-brand-hover: var(--ink-800);\n  --bg-accent:      var(--signal-500);\n\n  --fg-default:     var(--paper-900);  /* near-black for body text */\n  --fg-muted:       var(--paper-600);\n  --fg-subtle:      var(--paper-500);\n  --fg-on-brand:    var(--paper-0);\n  /* Accent foreground is INK-950 (near-black), not white.\n     White on IDOT Orange (#F58220) is 2.6:1 — fails WCAG AA for\n     text. Ink-950 on IDOT Orange is ~14:1, clears AAA. This\n     matches civic / safety-orange convention (orange + black). */\n  --fg-on-accent:   var(--ink-950);\n  --fg-link:        var(--ink-500);    /* navy-2 for links */\n\n  --border-default: var(--paper-300);\n  --border-strong:  var(--paper-400);\n  --border-brand:   var(--ink-700);\n  --border-focus:   var(--signal-500);\n\n  /* ---------- Typography ----------\n     Self-hosted licensed Helvetica Neue LT Pro (full family in /fonts;\n     declarations in fonts.css, imported by the host HTML).\n       Primary sans:    Helvetica Neue LT Pro (weights 100, 200, 300, 400, 500, 700, 800, 900 + italics)\n       Condensed:       Helvetica Neue LT Pro Cond (same axis + 950 XBlack)\n       Extended:        Helvetica Neue LT Pro Ext\n       Bold outline:    Helvetica Neue LT Pro Bold Outline (cover/poster only)\n       Letter body:     Times New Roman / Georgia (formal documents)\n       Mono:            JetBrains Mono / system mono (IDs, tabular data) */\n  --font-sans:        \"Helvetica Neue LT Pro\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n  --font-sans-cond:   \"Helvetica Neue LT Pro Cond\", \"Helvetica Neue Condensed\", \"Arial Narrow\", \"Helvetica Neue\", Arial, sans-serif;\n  --font-sans-ext:    \"Helvetica Neue LT Pro Ext\", \"Helvetica Neue\", Arial, sans-serif;\n  --font-outline:     \"Helvetica Neue LT Pro Bold Outline\", \"Helvetica Neue LT Pro\", \"Helvetica Neue\", Arial, sans-serif;\n  --font-serif:       \"Times New Roman\", \"Liberation Serif\", Georgia, Times, serif;\n  --font-letter:      \"Times New Roman\", \"Liberation Serif\", Georgia, Times, serif;\n  --font-mono:        \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* All display / UI type uses --font-sans by default. */\n  --font-display: var(--font-sans);\n\n  --text-xs:   12px;\n  --text-sm:   14px;\n  --text-base: 16px;\n  --text-md:   18px;\n  --text-lg:   20px;\n  --text-xl:   24px;\n  --text-2xl:  30px;\n  --text-3xl:  38px;\n  --text-4xl:  48px;\n  --text-5xl:  64px;\n  --text-6xl:  84px;\n\n  --leading-tight: 1.10;\n  --leading-snug:  1.25;\n  --leading-normal: 1.5;\n  --leading-loose: 1.7;\n\n  --tracking-tight: -0.02em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-caps:   0.12em;\n\n  /* ---------- Spacing (4px base) ---------- */\n  --s-0: 0; /* @kind spacing */\n  --s-1: 4px;\n  --s-2: 8px;\n  --s-3: 12px;\n  --s-4: 16px;\n  --s-5: 20px;\n  --s-6: 24px;\n  --s-8: 32px;\n  --s-10: 40px;\n  --s-12: 48px;\n  --s-16: 64px;\n  --s-20: 80px;\n  --s-24: 96px;\n  --s-32: 128px;\n\n  /* ---------- Radius, restrained, civic ---------- */\n  --radius-none: 0;\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-lg: 8px;\n  --radius-pill: 999px;\n\n  /* ---------- Shadow ---------- */\n  --shadow-sm: 0 1px 2px rgba(0, 35, 65, 0.06), 0 0 0 1px rgba(0, 35, 65, 0.04);\n  --shadow-md: 0 4px 12px -2px rgba(0, 35, 65, 0.10), 0 2px 4px -1px rgba(0, 35, 65, 0.05);\n  --shadow-lg: 0 16px 32px -8px rgba(0, 35, 65, 0.16), 0 4px 8px -2px rgba(0, 35, 65, 0.06);\n  --shadow-focus: 0 0 0 3px rgba(245, 130, 32, 0.35);\n\n  /* ---------- Layout ---------- */\n  --container-max: 1280px;\n  --sidebar-width: 256px;\n  --header-height: 64px;\n}\n\n/* ---------- Dark mode token overrides ----------\n   When --bg-brand flips to a lighter Ink step (ink-300) so primary\n   buttons stand off the dark canvas, --fg-on-brand must flip to\n   ink-950 (near-black) for WCAG AA. White text on ink-300 is ~2.5:1\n   and fails. ink-950 on ink-300 is ~9.4:1 and clears AAA. */\n[data-theme=\"dark\"] {\n  --bg-canvas:      var(--ink-950);\n  --bg-surface:     var(--ink-900);\n  --bg-sunken:      #001119;\n  --bg-inverse:     var(--paper-50);\n  --bg-brand:       var(--ink-300);\n  --bg-brand-hover: var(--ink-200);\n\n  --fg-default:     var(--paper-100);\n  --fg-muted:       var(--paper-400);\n  --fg-subtle:      var(--paper-500);\n  --fg-on-brand:    var(--ink-950);   /* flipped: dark text on the lighter dark-mode brand surface */\n  --fg-link:        var(--ink-200);\n\n  --border-default: #15263a;\n  --border-strong:  #1f3552;\n  --border-brand:   var(--ink-300);\n\n  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.04);\n  --shadow-md: 0 4px 12px -2px rgba(0, 0, 0, 0.5);\n  --shadow-lg: 0 16px 32px -8px rgba(0, 0, 0, 0.6);\n}\n\n/* =========================================================\n   Base styles\n   ========================================================= */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  color: var(--fg-default);\n  background: var(--bg-canvas);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Display headlines use the brand sans, not a serif.\n   The serif is reserved for letter/memo body copy. */\nh1, h2, h3, h4 {\n  font-family: var(--font-sans);\n  font-weight: 700;\n  letter-spacing: var(--tracking-tight);\n  line-height: var(--leading-tight);\n  margin: 0;\n}\np { margin: 0; }\na { color: var(--fg-link); text-decoration: underline; text-underline-offset: 2px; text-decoration-thickness: 1px; }\na:hover { text-decoration-thickness: 2px; color: var(--idot-orange); }\n\n::selection { background: var(--signal-300); color: var(--ink-950); }\n\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--fg-muted);\n}\n\n.mono { font-family: var(--font-mono); }\n.serif { font-family: var(--font-serif); }\n\n/* IDOT rule, the brand's signature 3px orange underline.\n   Drop on anything you want to treat as a headline: H1, section\n   H2, document chapter title, cover lockup. Combine with\n   .idot-rule--lead on a child span to apply the orange-word\n   treatment (\"THE OFFICIAL IDOT LOGO\"). */\n.idot-rule {\n  display: inline-block;\n  max-width: 100%;\n  padding-bottom: var(--s-3);\n  border-bottom: 3px solid var(--signal-500);\n}\n.idot-rule--thin { border-bottom-width: 2px; padding-bottom: var(--s-2); }\n.idot-rule--block { display: block; }\n.lead { color: var(--signal-500); }\n\n.letter { font-family: var(--font-letter); }\n\n/* =========================================================\n   Reduced motion\n   The brand guide asks for conservative motion (fades + short\n   translations, 120–320ms). For users who have opted out of\n   motion entirely, collapse every transition and animation to\n   ~instant. Documented in the Accessibility section.\n   ========================================================= */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    transition-duration: 0.01ms !important;\n    transition-delay: 0ms !important;\n    animation-duration: 0.01ms !important;\n    animation-delay: 0ms !important;\n    animation-iteration-count: 1 !important;\n    scroll-behavior: auto !important;\n  }\n}\n\n/* d1ms-print-patch */\n@media print {\n  button, select { display: none !important; }\n  div[style*=\"height:100vh\"] { height: auto !important; overflow: visible !important; }\n  div[style*=\"width:340px\"] { display: none !important; }\n  .d1ms-scroll { overflow: visible !important; }\n}\n<\u002Fstyle>\n  <style>\n    html, body { margin: 0; height: 100%; background: var(--paper-100); }\n    * { box-sizing: border-box; }\n    textarea, input, select, button { font-family: var(--font-sans); }\n    input::placeholder, textarea::placeholder { color: #4a4a4a; -webkit-text-fill-color: #4a4a4a; opacity: 1; }\n    a { color: var(--fg-link); }\n    a:hover { color: var(--idot-blue); }\n    .d1ms-scroll::-webkit-scrollbar { width: 9px; }\n    .d1ms-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }\n    @keyframes d1msPulse { 0% { box-shadow: 0 0 0 0 rgba(226,110,56,.55); } 70% { box-shadow: 0 0 0 8px rgba(226,110,56,0); } 100% { box-shadow: 0 0 0 0 rgba(226,110,56,0); } }\n    @keyframes d1msSlideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }\n    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex; flex-direction:column; height:100vh; min-height:560px; font-family:var(--font-sans); color:var(--fg-default); background:var(--paper-100); -webkit-font-smoothing:antialiased;\">\n\n  <!-- ============ HEADER ============ -->\n  <div style=\"flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:11px 20px; background:var(--idot-blue); color:#fff; border-bottom:3px solid var(--idot-orange);\">\n    <div style=\"display:flex; align-items:center; gap:12px; min-width:0;\">\n      <img src=\"b49d2a2e-80cd-4417-828d-2311bd48a17e\" width=\"34\" height=\"34\" alt=\"Illinois Department of Transportation\" style=\"display:block; flex:0 0 auto;\">\n      <div style=\"min-width:0;\">\n        <div style=\"display:flex; align-items:center; gap:9px;\">\n          <span style=\"font-size:15px; font-weight:800; letter-spacing:-.01em; line-height:1.1;\">D1 Meeting Sidecar<\u002Fspan>\n          <span style=\"{{ liveDotStyle }}\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:var(--font-mono); font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--idot-orange); margin-top:3px;\">District 1 · Utility Unit · Live Meeting Assistant<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end;\">\n      <select value=\"{{ sourceSel }}\" onchange=\"{{ setSource }}\" disabled=\"{{ running }}\" title=\"What to transcribe\" style=\"background:#fff; color:var(--idot-blue); border:1px solid rgba(255,255,255,.3); border-radius:var(--radius-sm); padding:7px 9px; font-size:12px; font-weight:600; cursor:pointer;\">\n        <option value=\"headset\">Headset, just me<\u002Foption>\n        <option value=\"room\">Room / speakerphone<\u002Foption>\n        <option value=\"tab\">Mic + meeting tab<\u002Foption>\n        <option value=\"screen\">Mic + computer audio<\u002Foption>\n      <\u002Fselect>\n      <button onclick=\"{{ onStart }}\" style=\"{{ startBtnStyle }}\">{{ startBtnLabel }}<\u002Fbutton>\n      <span style=\"width:1px; height:22px; background:rgba(255,255,255,.2);\"><\u002Fspan>\n      <button onclick=\"{{ onLoadSample }}\" style=\"background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.22); color:#fff; border-radius:var(--radius-sm); padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer;\" style-hover=\"background:rgba(255,255,255,.16);\">Load sample<\u002Fbutton>\n      <button onclick=\"{{ onCopy }}\" style=\"background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.22); color:#fff; border-radius:var(--radius-sm); padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer;\" style-hover=\"background:rgba(255,255,255,.16);\">Copy notes<\u002Fbutton>\n      <button onclick=\"{{ onExportJson }}\" style=\"background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.22); color:#fff; border-radius:var(--radius-sm); padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer;\" style-hover=\"background:rgba(255,255,255,.16);\">Export JSON<\u002Fbutton>\n      <button onclick=\"{{ onExportBrief }}\" style=\"background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.22); color:#fff; border-radius:var(--radius-sm); padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer;\" style-hover=\"background:rgba(255,255,255,.16);\">Follow-up brief<\u002Fbutton>\n      <button onclick=\"{{ onOpenSettings }}\" style=\"background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.22); color:#fff; border-radius:var(--radius-sm); padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer;\" style-hover=\"background:rgba(255,255,255,.16);\">Settings<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ BODY ============ -->\n  <div style=\"flex:1; display:flex; overflow:hidden; min-height:0;\">\n\n    <!-- LEFT COLUMN -->\n    <div style=\"width:340px; min-width:340px; flex:0 0 auto; background:var(--paper-50); border-right:1px solid var(--border-default); display:flex; flex-direction:column; overflow:hidden;\">\n      <div style=\"padding:13px 16px; border-bottom:1px solid var(--border-default); background:#fff7ed;\">\n        <div style=\"display:flex; gap:9px; align-items:baseline;\">\n          <span style=\"font-family:var(--font-mono); font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:#8a4a0b; background:#fddebd; border-radius:3px; padding:2px 8px; flex:0 0 auto;\">Working notes<\u002Fspan>\n          <span style=\"font-size:11px; line-height:1.45; color:#6b3608;\">Not official minutes. AI coaching is suggestion only. Evidence-based; draft, not a record of decision.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding:15px 16px; border-bottom:1px solid var(--border-default);\">\n        <div style=\"font-family:var(--font-mono); font-size:11px; color:var(--paper-800); font-weight:600; line-height:1.4;\">{{ statusText }}<\u002Fdiv>\n        <div style=\"height:7px; background:var(--paper-200); border:1px solid var(--border-default); border-radius:999px; overflow:hidden; margin-top:10px;\">\n          <div id=\"d1msMicFill\" style=\"height:100%; width:0%; background:linear-gradient(90deg, var(--idot-blue), var(--idot-orange)); border-radius:999px; transition:width .1s;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding:14px 16px 8px; display:flex; align-items:center; gap:9px; flex:0 0 auto;\">\n        <span style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.13em; text-transform:uppercase; color:var(--idot-orange);\">Live coaching<\u002Fspan>\n        <span style=\"flex:1; height:1px; background:var(--border-default);\"><\u002Fspan>\n        <button onclick=\"{{ onCoachNow }}\" style=\"background:none; border:none; padding:0; font-family:var(--font-mono); font-size:9.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--fg-link); cursor:pointer; text-decoration:underline;\">Suggest a tip<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"d1ms-scroll\" style=\"flex:1; overflow-y:auto; padding:2px 16px 16px; display:flex; flex-direction:column; gap:9px; min-height:0;\">\n        <sc-if value=\"{{ insightsEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"color:var(--paper-700); font-size:12px; line-height:1.6; padding:20px 12px; text-align:center; border:1px dashed var(--border-strong); border-radius:var(--radius-sm);\">Coaching tips appear here once the meeting is running and enough has been said. They are prompts for the coordinator, not determinations.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-for list=\"{{ insights }}\" as=\"ins\" hint-placeholder-count=\"2\">\n          <div style=\"background:#fff; border:1px solid var(--border-default); border-left:3px solid var(--idot-orange); border-radius:var(--radius-sm); padding:10px 12px; font-size:12.5px; line-height:1.55; box-shadow:0 1px 2px rgba(16,24,40,.04); animation:d1msSlideIn .25s ease-out; position:relative;\">\n            <div style=\"display:flex; align-items:baseline; gap:8px; margin-bottom:4px;\">\n              <span style=\"font-family:var(--font-mono); font-size:9.5px; color:var(--fg-muted); letter-spacing:.04em;\">{{ ins.time }}<\u002Fspan>\n              <button onclick=\"{{ ins.dismiss }}\" style=\"margin-left:auto; background:none; border:none; padding:0; font-family:var(--font-mono); font-size:9px; letter-spacing:.06em; text-transform:uppercase; color:var(--fg-muted); cursor:pointer;\" style-hover=\"color:var(--idot-blue);\">Dismiss<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"color:var(--fg-default);\">{{ ins.text }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- RIGHT COLUMN -->\n    <div style=\"flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0;\">\n      <div style=\"padding:12px 24px; border-bottom:1px solid var(--border-default); display:flex; align-items:center; justify-content:space-between; gap:14px; flex:0 0 auto; background:#fff;\">\n        <input value=\"{{ title }}\" onchange=\"{{ setTitle }}\" placeholder=          <\u002Fdiv>\n            <div style=\"font-size:14px; line-height:1.65; color:var(--fg-default);\">{{ seg.text }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <sc-if value=\"{{ showInterimMic }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:74ch; opacity:.7;\">\n            <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:4px;\"><span style=\"{{ chipYou }}\">{{ curLabelMic }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:14px; line-height:1.65; color:var(--fg-muted); font-style:italic;\">{{ interimMic }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showInterimTab }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:74ch; opacity:.7;\">\n            <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:4px;\"><span style=\"{{ chipRemote }}\">{{ curLabelTab }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:14px; line-height:1.65; color:var(--fg-muted); font-style:italic;\">{{ interimTab }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ SETTINGS MODAL ============ -->\n  <sc-if value=\"{{ settingsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ onBackdrop }}\" style=\"position:fixed; inset:0; background:rgba(11,23,44,.5); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;\">\n    <div onclick=\"{{ stop }}\" class=\"d1ms-scroll\" style=\"background:var(--paper-50); border:1px solid var(--border-strong); border-radius:var(--radius-md); width:480px; max-width:94vw; max-height:88vh; overflow-y:auto; box-shadow:0 18px 50px rgba(11,23,44,.28);\">\n      <div style=\"padding:16px 22px; border-bottom:1px solid var(--border-default); display:flex; align-items:center; justify-content:space-between; background:var(--idot-blue); color:#fff; border-radius:var(--radius-md) var(--radius-md) 0 0;\">\n        <span style=\"font-size:15px; font-weight:800; letter-spacing:-.01em;\">Settings<\u002Fspan>\n        <button onclick=\"{{ closeSettings }}\" style=\"background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.28); color:#fff; border-radius:var(--radius-sm); padding:5px 12px; font-size:12px; font-weight:700; cursor:pointer;\">Close<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"padding:20px 22px;\">\n\n        <div style=\"margin-bottom:15px;\">\n          <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">AI provider<\u002Fdiv>\n          <select value=\"{{ provider }}\" onchange=\"{{ setProvider }}\" style=\"width:100%; padding:9px 11px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-sm); color:var(--fg-default); font-size:13px;\">\n            <option value=\"builtin\">Built-in assistant (no key, this workspace)<\u002Foption>\n            <option value=\"github\">GitHub Copilot<\u002Foption>\n            <option value=\"m365\">Microsoft 365 Copilot<\u002Foption>\n            <option value=\"anthropic\">Claude (Anthropic)<\u002Foption>\n            <option value=\"aio\">Self-hosted / open source (AIO)<\u002Foption>\n          <\u002Fselect>\n          <sc-if value=\"{{ hasProviderHint }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:11px; color:var(--paper-700); margin-top:6px; line-height:1.5;\">{{ providerHint }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ pGithub }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-bottom:15px;\">\n            <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">GitHub token (Copilot)<\u002Fdiv>\n            <input type=\"password\" value=\"{{ ghToken }}\" onchange=\"{{ setGhToken }}\" placeholder=\"ghp_...\" style=\"width:100%; padding:9px 11px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-sm); color:var(--fg-default); font-size:13px;\">\n            <div style=\"font-size:11px; color:var(--paper-700); margin-top:6px; line-height:1.5;\">Personal access token for a GitHub account with Copilot enabled. Stored only in this browser; sent only to GitHub's API.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:15px;\">\n            <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">Coaching model<\u002Fdiv>\n            <select value=\"{{ model }}\" onchange=\"{{ setModel }}\" style=\"width:100%; padding:9px 11px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-sm); color:var(--fg-default); font-size:13px;\">\n              <option value=\"gpt-4o\">gpt-4o (default)<\u002Foption>\n              <option value=\"gpt-4o-mini\">gpt-4o-mini (faster)<\u002Foption>\n              <option value=\"o1-mini\">o1-mini (deeper reasoning)<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ pM365 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-bottom:15px;\">\n            <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">Entra tenant ID<\u002Fdiv>\n            <input type=\"text\" value=\"{{ m365Tenant }}\" onchange=\"{{ setM365Tenant }}\" placeholder=\"contoso.onmicrosoft.com or GUID\" style=\"width:100%; padding:9px 11px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-sm); color:var(--fg-default); font-size:13px;\">\n          <\u002Fdiv>\n          <div style=\"margin-bottom:15px;\">\n            <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">App (client) ID<\u002Fdiv>\n            <input type=\"text\" value=\"{{ m365Client }}\" onchange=\"{{ setM365Client }}\" placeholder=\"00000000-0000-0000-0000-000000000000\" style=\"width:100%; padding:9px 11px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-sm); color:var(--fg-default); font-size:13px;\">\n            <div style=\"font-size:11px; color:var(--paper-700); margin-top:6px; line-height:1.5;\">From your IT department's Entra app registration (single-page app, redirect URI set to this page, delegated Copilot Chat permissions with admin consent). Requires an M365 Copilot license.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:15px; display:flex; align-items:center; gap:10px;\">\n            <button onclick=\"{{ onM365SignIn }}\" style=\"background:#fff; border:1px solid var(--border-strong); color:var(--idot-blue); border-radius:var(--radius-sm); padding:8px 14px; font-size:12.5px; font-weight:700; cursor:pointer;\">Sign in to Microsoft 365<\u002Fbutton>\n            <span style=\"font-size:11.5px; color:var(--paper-700);\">{{ m365StatusText }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ pAnthropic }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-bottom:15px;\">\n            <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">Anthropic API key<\u002Fdiv>\n            <input type=\"password\" value=\"{{ anthropicKey }}\" onchange=\"{{ setAnthropicKey }}\" placeholder=\"sk-ant-...\" style=\"width:100%; padding:9px 11px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-sm); color:var(--fg-default); font-size:13px;\">\n            <div style=\"font-size:11px; color:var(--paper-700); margin-top:6px; line-height:1.5;\">Stored only in this browser; sent only to Anthropic's API. Works when the file is opened from disk.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:15px;\">\n            <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">Claude model<\u002Fdiv>\n            <select value=\"{{ anthropicModel }}\" onchange=\"{{ setAnthropicModel }}\" style=\"width:100%; padding:9px 11px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-sm); color:var(--fg-default); font-size:13px;\">\n              <option value=\"claude-haiku-4-5-20251001\">Claude Haiku 4.5 (fast, default)<\u002Foption>\n              <option value=\"claude-sonnet-5\">Claude Sonnet 5 (balanced)<\u002Foption>\n              <option value=\"claude-opus-4-8\">Claude Opus 4.8 (highest quality)<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ pAio }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-bottom:15px;\">\n            <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">Server base URL<\u002Fdiv>\n            <input type=\"text\" value=\"{{ aioBaseUrl }}\" onchange=\"{{ setAioBaseUrl }}\" placeholder=\"http://localhost:8000 or https://integrate.api.nvidia.com/v1\" style=\"width:100%; padding:9px 11px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-sm); color:var(--fg-default); font-size:13px;\">\n            <div style=\"font-size:11px; color:var(--paper-700); margin-top:6px; line-height:1.5;\">Any OpenAI-compatible endpoint: NVIDIA NIM, Ollama, LiteLLM, vLLM, LM Studio. A trailing /v1 is handled either way. The server must allow CORS from this page. With a local server, transcript text never leaves the machine.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:15px;\">\n            <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">API key (optional)<\u002Fdiv>\n            <input type=\"password\" value=\"{{ aioKey }}\" onchange=\"{{ setAioKey }}\" placeholder=\"leave blank if the server needs none\" style=\"width:100%; padding:9px 11px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-sm); color:var(--fg-default); font-size:13px;\">\n          <\u002Fdiv>\n          <div style=\"margin-bottom:15px;\">\n            <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">Model name (optional)<\u002Fdiv>\n            <input type=\"text\" value=\"{{ aioModel }}\" onchange=\"{{ setAioModel }}\" placeholder=\"leave blank for the server default\" style=\"width:100%; padding:9px 11px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-sm); color:var(--fg-default); font-size:13px;\">\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"margin-bottom:15px;\">\n          <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">Coaching interval<\u002Fdiv>\n          <select value=\"{{ interval }}\" onchange=\"{{ setInterval }}\" style=\"width:100%; padding:9px 11px; background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-sm); color:var(--fg-default); font-size:13px;\">\n            <option value=\"15000\">Every 15 seconds<\u002Foption>\n            <option value=\"30000\">Every 30 seconds<\u002Foption>\n            <option value=\"60000\">Every 60 seconds<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:6px;\">\n          <div style=\"font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;\">Recent meetings (this device only)<\u002Fdiv>\n          <div style=\"border:1px solid var(--border-default); border-radius:var(--radius-sm); background:#fff; overflow:hidden;\">\n            <sc-if value=\"{{ historyEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"padding:10px 12px; font-size:12px; color:var(--fg-muted);\">No meetings yet.<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-for list=\"{{ history }}\" as=\"h\" hint-placeholder-count=\"2\">\n              <div onclick=\"{{ h.load }}\" style=\"padding:9px 12px; font-size:12px; border-bottom:1px solid var(--border-default); cursor:pointer; display:flex; justify-content:space-between; gap:10px;\" style-hover=\"background:var(--paper-50);\">\n                <span style=\"color:var(--fg-default);\">{{ h.label }}<\u002Fspan>\n                <span style=\"font-family:var(--font-mono); color:var(--fg-muted); white-space:nowrap;\">{{ h.date }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; justify-content:flex-end; gap:8px; margin-top:18px; padding-top:14px; border-top:1px solid var(--border-default);\">\n          <button onclick=\"{{ onClearHistory }}\" style=\"background:#fff; border:1px solid #d9705a; color:#a03418; border-radius:var(--radius-sm); padding:8px 14px; font-size:12.5px; font-weight:700; cursor:pointer;\">Clear history<\u002Fbutton>\n          <button onclick=\"{{ onSaveSettings }}\" style=\"background:var(--idot-blue); color:#fff; border:none; border-radius:var(--radius-sm); padding:8px 16px; font-size:12.5px; font-weight:700; cursor:pointer;\">Save<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TOAST ============ -->\n  <sc-if value=\"{{ toastOn }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--idot-blue); color:#fff; padding:10px 18px; border-radius:var(--radius-pill); font-size:12.5px; font-weight:500; z-index:200; box-shadow:0 10px 30px rgba(11,23,44,.3); max-width:min(560px,90vw); text-align:center;\">{{ toastText }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script>\n/* d1ms-migration-patch: the retired field build stored settings under idot_* keys.\n   Copy each one to the d1ms_* key this build reads. Never overwrites. */\n(function () {\n  try {\n    var map = {\n      d1ms_gh_token: 'idot_gh_token', d1ms_model: 'idot_model',\n      d1ms_interval: 'idot_interval', d1ms_history: 'idot_history',\n      d1ms_provider: 'idot_ai_provider', d1ms_m365_tenant: 'idot_m365_tenant',\n      d1ms_m365_client: 'idot_m365_client', d1ms_anthropic_key: 'idot_anthropic_key',\n      d1ms_anthropic_model: 'idot_anthropic_model', d1ms_aio_base: 'idot_aio_base',\n      d1ms_aio_key: 'idot_aio_key', d1ms_aio_model: 'idot_aio_model'\n    };\n    for (var k in map) {\n      if (!localStorage.getItem(k) && localStorage.getItem(map[k])) {\n        localStorage.setItem(k, localStorage.getItem(map[k]));\n      }\n    }\n  } catch (e) { /* storage unavailable, nothing to migrate */ }\n})();\n<\u002Fscript>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;coachingEnabled&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Coaching&quot;},&quot;defaultInterval&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;15000&quot;,&quot;30000&quot;,&quot;60000&quot;],&quot;default&quot;:&quot;30000&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Coaching&quot;},&quot;defaultProvider&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;builtin&quot;,&quot;github&quot;,&quot;m365&quot;,&quot;anthropic&quot;,&quot;aio&quot;],&quot;default&quot;:&quot;builtin&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Providers&quot;},&quot;autoloadSample&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Demo&quot;}}\">\nclass Component extends DCLogic {\n  LS = {\n    token:'d1ms_gh_token', model:'d1ms_model', interval:'d1ms_interval', history:'d1ms_history',\n    provider:'d1ms_provider', m365Tenant:'d1ms_m365_tenant', m365Client:'d1ms_m365_client', m365Pkce:'d1ms_m365_pkce',\n    anthropicKey:'d1ms_anthropic_key', anthropicModel:'d1ms_anthropic_model',\n    aioBaseUrl:'d1ms_aio_base', aioKey:'d1ms_aio_key', aioModel:'d1ms_aio_model'\n  };\n  TURN_GAP_MS = 4000;\n  SOURCE_MODES = {\n    headset: { micLabels:'you', capture:null },\n    room:    { micLabels:'rotate', capture:null },\n    tab:     { micLabels:'you', capture:'tab' },\n    screen:  { micLabels:'you', capture:'screen' }\n  };\n\n  COACHING_SYSTEM = 'You are a real-time coaching assistant for IDOT (Illinois Department of Transportation) District 1 utility coordination meetings. Based on the recent discussion, give ONE brief, actionable tip (2 to 3 sentences) about utility coordination process, letting and relocation timelines, right-of-way, records and verification, or a meeting pitfall. Hold authority discipline: coordination is not authorization; do not tell the coordinator to approve, authorize, waive, or admit fault; prefer wording like based on current information and subject to verification. It is a suggestion for a human, not a determination. Do not use em dashes or arrows. If nothing useful applies right now, reply with exactly: NO_COACHING_NEEDED';\n  EXTRACTION_SYSTEM = 'You analyze an IDOT District 1 utility coordination meeting transcript inside the D1 Utility Operations Framework. Extract draft Issue Cards plus meeting-level items. Evidence-based only: include nothing not stated in the transcript; use null for anything not mentioned. Do not infer authorizations, approvals, waivers, or fault. Confidence discipline: statements in a meeting are at best Known or Assumed; never output Verified. Set risk_color honestly: Gray when unknown, assumed or disputed. Respond with valid JSON only, no markdown, using exactly this structure: {\"issueCards\":[{\"title\":\"string\",\"owner_stakeholder\":\"string|null\",\"location\":\"string|null\",\"primary_module\":\"GOAD|MTUC|PWS|ROI|SI|CWDM|IQPC|SM|EWRT|IMLL|DPDD|ET|SC|UFR\",\"cluster\":\"Prime|Records|Subsurface|Conflict|Stakeholder|Governance\",\"status\":\"New-Intake|Records-Pending|Owner-Response-Pending|Verification-Pending|Conflict-Confirmed|Permit-Review-Pending|Construction-Coordination-Pending|Ready-For-Milestone|Closed|Deferred|Disputed\",\"risk_color\":\"Red|Yellow|Green|Gray\",\"claims\":[{\"statement\":\"string\",\"confidence\":\"Known|Assumed|Unknown|Disputed\",\"source\":\"speaker label\"}],\"requested_action\":\"string|null\",\"responsible_party\":\"string|null\",\"due_date\":\"YYYY-MM-DD|null\",\"escalation_triggers\":[\"string\"]}],\"utilities\":[{\"owner\":\"string\",\"facilityType\":\"string\",\"conflict\":\"yes|potential|no\",\"location\":\"string|null\",\"status\":\"string|null\",\"notes\":\"string|null\"}],\"actionItems\":[{\"description\":\"string\",\"assignee\":\"string|null\",\"dueDate\":\"YYYY-MM-DD|null\",\"priority\":\"high|medium|low\"}],\"keyDecisions\":[{\"description\":\"string\",\"madeBy\":\"string|null\"}],\"risks\":[{\"description\":\"string\",\"level\":\"high|medium|low\",\"category\":\"schedule|cost|technical|legal|other\",\"mitigation\":\"string|null\"}]}';\n\n  SAMPLE_SEGMENTS = [\n    { speaker:'You', source:'mic', text:'Thanks for joining the utility coordination call for the IL-64 resurfacing and widening between Mannheim Road and IL-50. Let us confirm where each facility stands relative to the right-of-way clear date.' },\n    { speaker:'Remote A', source:'tab', text:'ComEd has overhead distribution along the north side. We believe most of it sits outside the proposed widening, but we have not verified pole offsets against the new cross section.' },\n    { speaker:'You', source:'mic', text:'Understood. We will need verified offsets, not atlas positions, before we can call clearance. That is a subsurface confidence question for the aerial facilities too.' },\n    { speaker:'Remote B', source:'tab', text:'Nicor has a gas main crossing near Station 240. There may be a prior easement that predates the highway. We will have to pull the records.' },\n    { speaker:'You', source:'mic', text:'A claimed prior right has to be established by instrument and verification, not by assertion. Until it is verified we record it as claimed, and any cost question stays subject to verification.' },\n    { speaker:'Remote A', source:'tab', text:'What is the right-of-way clear date you are targeting?' },\n    { speaker:'You', source:'mic', text:'It is programmed for the fall letting. Once right-of-way is clear and formal notice issues, the relocation period runs. Nonresponse does not pause the project clock.' },\n    { speaker:'Remote C', source:'tab', text:'AT&T has buried fiber on the south side. We can relocate, but we will need about ninety days once we receive notice.' },\n    { speaker:'You', source:'mic', text:'Noted. I will send the coordination letter this week. If anyone believes they hold a reimbursable interest, send the documentation so we can route it to a determination.' },\n    { speaker:'Remote B', source:'tab', text:'We will get you the easement records for the Station 240 crossing by next Friday.' }\n  ];\n  SAMPLE_INSIGHTS = [\n    'A claimed prior right is not established until confirmed by instrument. Keep the Station 240 easement recorded as claimed and route any cost question to a reimbursement determination, subject to verification.',\n    'Confirm the relocation-period basis before citing it in the letter. Based on current information, treat ninety days as Department notice practice until the Office of Chief Counsel confirms the statutory source.'\n  ];\n  SAMPLE_EXTRACTION = {\n    issueCards: [\n      { title:'ComEd pole offsets not verified against the new cross section', owner_stakeholder:'ComEd', location:'IL-64 north side', primary_module:'UFR', cluster:'Records', status:'Verification-Pending', risk_color:'Gray', claims:[{ statement:'Overhead distribution likely sits outside the widening, offsets not verified', confidence:'Assumed', source:'Remote A' }], requested_action:'Verify pole offsets against the new cross section', responsible_party:'ComEd', due_date:null, escalation_triggers:[] },\n      { title:'Claimed prior easement at the Station 240 gas crossing', owner_stakeholder:'Nicor', location:'Station 240', primary_module:'ROI', cluster:'Records', status:'Records-Pending', risk_color:'Gray', claims:[{ statement:'A prior easement may predate the highway, records to be pulled', confidence:'Assumed', source:'Remote B' }], requested_action:'Pull easement records and route any cost question to a determination', responsible_party:'Nicor', due_date:null, escalation_triggers:[] },\n      { title:'AT&T buried fiber relocation on about ninety days notice', owner_stakeholder:'AT&T', location:'IL-64 south side', primary_module:'MTUC', cluster:'Stakeholder', status:'New-Intake', risk_color:'Yellow', claims:[{ statement:'Fiber can relocate on about ninety days once notice issues', confidence:'Known', source:'Remote C' }], requested_action:'Send the utility coordination letter', responsible_party:'Coordinator', due_date:null, escalation_triggers:[] }\n    ],\n    utilities: [\n      { owner:'ComEd', facilityType:'overhead distribution', conflict:'potential', location:'IL-64 north side', status:'pole offsets not verified', notes:'verify offsets against the new cross section' },\n      { owner:'Nicor', facilityType:'gas main crossing', conflict:'potential', location:'near Station 240', status:'possible prior easement; records to be pulled', notes:'prior right claimed, unverified' },\n      { owner:'AT&T', facilityType:'buried fiber', conflict:'yes', location:'IL-64 south side', status:'can relocate on about ninety days notice', notes:null }\n    ],\n    actionItems: [\n      { description:'Send the utility coordination letter for IL-64', assignee:'Coordinator', dueDate:null, priority:'high' },\n      { description:'Verify ComEd pole offsets against the new cross section', assignee:'ComEd', dueDate:null, priority:'medium' },\n      { description:'Pull easement records for the Station 240 gas crossing', assignee:'Nicor', dueDate:null, priority:'medium' },\n      { description:'Submit reimbursable-interest documentation if a claim is made', assignee:'Utilities', dueDate:null, priority:'low' }\n    ],\n    keyDecisions: [\n      { description:'Prior rights are recorded as claimed until verified by instrument; cost questions stay subject to verification', madeBy:'Coordinator' },\n      { description:'The relocation clock runs once right-of-way is clear and formal notice issues; nonresponse does not pause the project clock', madeBy:'Coordinator' }\n    ],\n    risks: [\n      { description:'Unverified ComEd pole offsets could delay clearance', level:'medium', category:'schedule', mitigation:'obtain verified offsets before calling clearance' },\n      { description:'Unverified prior easement claim at Station 240 could raise a cost-responsibility dispute', level:'medium', category:'legal', mitigation:'open a records and ownership investigation' }\n    ]\n  };\n\n  m365 = { accessToken:null, expiresAt:0, conversationId:null, warned:false };\n  AUTHORITY_BOUNDARY = 'Coordination only; no ROW, permit, contract, funding, schedule or waiver.';\n  stampIssueCards(cards){\n    if (!cards || !cards.length) return null;\n    const year = new Date().getFullYear();\n    return cards.map((c, i) => Object.assign(\n      { card_id: 'UTL-' + year + '-DRAFT-' + String(i + 1).padStart(2, '0') }, c,\n      { authority_boundary: this.AUTHORITY_BOUNDARY, approval_status: 'none',\n        needs_human_approval: true, drafted_by: 'D1 Meeting Sidecar (meeting extraction)' }));\n  }\n  M365_SCOPES = ['Sites.Read.All','Mail.Read','People.Read.All','OnlineMeetingTranscript.Read.All','Chat.Read','ChannelMessage.Read.All','ExternalItem.Read.All'].map(s => 'https://graph.microsoft.com/' + s).join(' ');\n\n  state = {\n    running:false, starting:false,\n    segments:[], interim:{ mic:'', tab:'' },\n    insights:[], cannedExtraction:null,\n    statusText:'Idle. Click Start listening, or load a sample meeting.',\n    title:'', sourceSel:'headset',\n    settingsOpen:false, toast:'',\n    provider: this.get('d1ms_provider') || (this.props.defaultProvider ?? 'builtin'),\n    ghToken: this.get('d1ms_gh_token') || '',\n    model: this.get('d1ms_model') || 'gpt-4o',\n    interval: this.get('d1ms_interval') || (this.props.defaultInterval ?? '30000'),\n    m365Tenant: this.get('d1ms_m365_tenant') || '',\n    m365Client: this.get('d1ms_m365_client') || '',\n    anthropicKey: this.get('d1ms_anthropic_key') || '',\n    anthropicModel: this.get('d1ms_anthropic_model') || 'claude-haiku-4-5-20251001',\n    aioBaseUrl: this.get('d1ms_aio_base') || '',\n    aioKey: this.get('d1ms_aio_key') || '',\n    aioModel: this.get('d1ms_aio_model') || '',\n    history: this.loadHistory(),\n    m365SignedIn:false\n  };\n\n  // recognizers + audio (non-state)\n  micRecognizer=null; tabRecognizer=null; displayStream=null; audioContext=null; analyser=null; micStream=null; levelRAF=null;\n  lastCoachedAt=0; meetingStartTime=null; toastTimer=null; aioWarned=false;\n  remoteRot={ names:['Remote A','Remote B','Remote C','Remote D'], idx:0, lastFinalTime:0, hasSpoken:false };\n  roomRot={ names:['Speaker A','Speaker B','Speaker C','Speaker D'], idx:0, lastFinalTime:0, hasSpoken:false };\n\n  get(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }\n  set(k,v){ try { localStorage.setItem(k,v); } catch(e){} }\n  loadHistory(){ try { return JSON.parse(localStorage.getItem('d1ms_history')||'[]'); } catch(e){ return []; } }\n\n  componentDidMount(){\n    this._onMsg = (e)=>{\n      if (e.origin !== location.origin || !e.data || e.data.type !== 'd1ms-m365-token') return;\n      if (e.data.error){ this.showToast('Microsoft sign-in failed: ' + e.data.error); return; }\n      this.m365.accessToken = e.data.accessToken;\n      this.m365.expiresAt = Date.now() + (e.data.expiresIn || 3600) * 1000;\n      this.m365.warned = false;\n      this.setState({ m365SignedIn:true });\n      this.showToast('Signed in to Microsoft 365.');\n    };\n    this._onBefore = (e)=>{ if (this.state.running && this.state.segments.length){ e.preventDefault(); e.returnValue=''; } };\n    window.addEventListener('message', this._onMsg);\n    window.addEventListener('beforeunload', this._onBefore);\n    // OAuth popup redirect target\n    try {\n      if (window.opener && new URLSearchParams(location.search).get('code')) this.completeM365Auth();\n    } catch(e){}\n    if ((this.props.autoloadSample ?? false) && !this.state.segments.length) this.loadSample();\n  }\n  componentWillUnmount(){\n    window.removeEventListener('message', this._onMsg);\n    window.removeEventListener('beforeunload', this._onBefore);\n    this.stopLevelMeter();\n    if (this.micRecognizer) this.micRecognizer.stop();\n    if (this.tabRecognizer) this.tabRecognizer.stop();\n    this.cleanupDisplayStream();\n  }\n  componentDidUpdate(){\n    if (this.state.running || this.state.segments.length){\n      const b = document.getElementById('d1msBody');\n      if (b) b.scrollTop = b.scrollHeight;\n    }\n  }\n\n  showToast(msg){\n    this.setState({ toast:msg });\n    clearTimeout(this.toastTimer);\n    this.toastTimer = setTimeout(()=> this.setState({ toast:'' }), 2800);\n  }\n  setField(k, lsKey){ return (e)=>{ const v=e.target.value; this.setState({ [k]:v }); if (lsKey) this.set(lsKey, v); }; }\n\n  // ---------- speech recognition ----------\n  recCtor(){ return window.SpeechRecognition || window.webkitSpeechRecognition; }\n  makeRecognizer(source, track){\n    const Ctor = this.recCtor(); const rec = new Ctor();\n    rec.continuous = true; rec.interimResults = true; rec.lang = 'en-US';\n    let active = false; const self = this;\n    rec.onresult = (event)=>{\n      let interimText='';\n      for (let i=event.resultIndex; i<event.results.length; i++){\n        const r = event.results[i]; const text = r[0].transcript.trim();\n        if (!text) continue;\n        if (r.isFinal) self.appendFinal(text, source); else interimText += text + ' ';\n      }\n      self.setInterim(source, interimText.trim());\n    };\n    rec.onerror = (e)=>{\n      if (e.error==='no-speech' || e.error==='aborted') return;\n      console.error('Speech recognition error (' + source + '):', e.error);\n      if (e.error==='not-allowed' && source==='mic'){ self.showToast('Microphone access denied. Check browser permissions.'); self.stopListening(); }\n    };\n    rec.onend = ()=>{ if (self.state.running && active){ try { track ? rec.start(track) : rec.start(); } catch(e){} } };\n    return {\n      start(){ track ? rec.start(track) : rec.start(); active=true; },\n      stop(){ active=false; try { rec.stop(); } catch(e){} }\n    };\n  }\n  rotationFor(source){ if (source==='tab') return this.remoteRot; return this.currentSourceMode().micLabels==='rotate' ? this.roomRot : null; }\n  currentSourceMode(){ return this.SOURCE_MODES[this.state.sourceSel] || this.SOURCE_MODES.headset; }\n  labelFor(source){\n    const rot = this.rotationFor(source); if (!rot) return 'You';\n    const now = Date.now();\n    if (rot.hasSpoken && now - rot his.meetingStartTime||this.state.segments[0].ts))/1000), wordCount:this.wordCount(), captureMode:this.state.sourceSel },\n      provenance:{ METHOD: x ? 'live-transcription+ai-extraction' : 'live-transcription', SOURCE:meta.sourceKey, DATE_COLLECTED:new Date().toISOString(), aiProvider: x ? this.providerId() : null, evidenceNote:'Extracted only from statements in the attached transcript. Coordination is not authorization.' },\n      draft:true, needsHumanApproval:true, authorityBoundary:this.AUTHORITY_BOUNDARY,\n      issueCards:this.stampIssueCards(x?.issueCards),\n      utilities:x?.utilities ?? null, actionItems:x?.actionItems ?? null, keyDecisions:x?.keyDecisions ?? null, risks:x?.risks ?? null,\n      insights:this.state.insights.map(i=>({ time:i.time, text:i.text })),\n      transcript:this.state.segments.map(s=>({ speaker:s.speaker, text:s.text, timestamp:new Date(s.ts).toISOString() }))\n    };\n    this.downloadFile(meta.fileStem+'.meeting.json', JSON.stringify(doc,null,2), 'application/json');\n    this.showToast(x ? 'Structured meeting JSON downloaded.' : 'Transcript JSON downloaded (no extraction available).');\n  }\n  async exportBrief(){\n    if (!this.state.segments.length){ this.showToast('Nothing to export yet.'); return; }\n    this.showToast('Building brief…');\n    const x = await this.resolveExtraction();\n    if (!x){ this.showToast('The brief needs extraction. Configure a provider in Settings, or load the sample.'); return; }\n    const meta = this.meetingMeta(); const L = [];\n    L.push('# Meeting Follow-up Brief, ' + meta.title); L.push('');\n    L.push('Generated by D1 Meeting Sidecar from the ' + meta.dateIso.slice(0,10) + ' utility coordination meeting. Working notes, not official minutes.');\n    L.push('Evidence-based: everything below traces to statements in the transcript (SOURCE: ' + meta.sourceKey + '). Coordination is not authorization.'); L.push('');\n    L.push('## Mission'); L.push(''); L.push('Complete the follow-up actions recorded in the \"' + meta.title + '\" utility coordination meeting.'); L.push('');\n    if (x.keyDecisions?.length){ L.push('## Context, decisions recorded'); L.push(''); x.keyDecisions.forEach(d => L.push('- ' + d.description + (d.madeBy ? ' (recorded by ' + d.madeBy + ')' : ''))); L.push(''); }\n    const cards = this.stampIssueCards(x.issueCards) || [];\n    if (cards.length){ L.push('## Context, draft issue cards in play'); L.push(''); cards.forEach(c => L.push('- ' + c.card_id + ' [' + c.risk_color + '] ' + c.title + (c.owner_stakeholder ? ' (' + c.owner_stakeholder + ')' : '') + '; module ' + c.primary_module + ', status ' + c.status)); L.push(''); }\n    if (x.utilities?.length){ L.push('## Context, utility conflicts in play'); L.push(''); x.utilities.forEach(u => L.push('- ' + u.owner + ' (' + u.facilityType + '), conflict: ' + u.conflict + (u.location ? ' at ' + u.location : '') + (u.status ? '; status: ' + u.status : ''))); L.push(''); }\n    L.push('## Acceptance criteria'); L.push('');\n    if (x.actionItems?.length) x.actionItems.forEach((a,i)=> L.push('- AC' + (i+1) + ': ' + a.description + (a.assignee ? ' (owner: ' + a.assignee + ')' : '') + (a.dueDate ? ', due ' + a.dueDate : '') + ' [priority: ' + a.priority + ']'));\n    else L.push('- AC1: no action items were recorded in this meeting.');\n    L.push('');\n    if (x.risks?.length){ L.push('## Constraints, risks to respect'); L.push(''); x.risks.forEach(r => L.push('- [' + r.level + '/' + r.category + '] ' + r.description + (r.mitigation ? ', mitigation: ' + r.mitigation : ''))); L.push(''); }\n    L.push('## Non-goals'); L.push(''); L.push('- Nothing beyond the actions and decisions recorded in this meeting. No authorization, approval, waiver, or fault is implied.'); L.push('');\n    this.downloadFile(meta.fileStem+'.brief.md', L.join('\\n'), 'text/markdown');\n    this.showToast('Follow-up brief downloaded.');\n  }\n\n  // ---------- settings ----------\n  saveSettings(){\n    this.set(this.LS.provider, this.state.provider);\n    this.set(this.LS.token, this.state.ghToken.trim());\n    this.set(this.LS.model, this.state.model);\n    this.set(this.LS.interval, this.state.interval);\n    this.set(this.LS.m365Tenant, this.state.m365Tenant.trim());\n    this.set(this.LS.m365Client, this.state.m365Client.trim());\n    this.set(this.LS.anthropicKey, this.state.anthropicKey.trim());\n    this.set(this.LS.anthropicModel, this.state.anthropicModel);\n    this.set(this.LS.aioBaseUrl, this.state.aioBaseUrl.trim().replace(/\\/+$/,''));\n    this.set(this.LS.aioKey, this.state.aioKey.trim());\n    this.set(this.LS.aioModel, this.state.aioModel.trim());\n    this.setState({ settingsOpen:false }); this.showToast('Settings saved.');\n  }\n\n  chip(bg, fg){ return 'font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; border-radius:var(--radius-pill); padding:1px 9px 2px; background:'+bg+'; color:'+fg+';'; }\n  speakerChip(source, speaker){\n    if (source==='tab') return this.chip('#e3f3ee', '#0f6b57');\n    if (speaker && /^Speaker/.test(speaker)) return this.chip('#eef0f3', '#3f4650');\n    return this.chip('#e8eef4', '#002341');\n  }\n\n  renderVals(){\n    const s = this.state;\n    const p = this.providerId();\n    const m365Https = location.protocol === 'https:';\n    return {\n      running: s.running,\n      startBtnLabel: s.running ? 'Stop listening' : 'Start listening',\n      startBtnStyle: s.running\n        ? 'background:#fff; color:#a03418; border:1px solid #f0b7a6; border-radius:var(--radius-sm); padding:7px 15px; font-size:12.5px; font-weight:700; cursor:pointer;'\n        : 'background:var(--idot-orange); color:var(--ink-950); border:none; border-radius:var(--radius-sm); padding:7px 15px; font-size:12.5px; font-weight:700; cursor:pointer;',\n      liveDotStyle: 'width:9px; height:9px; border-radius:50%; flex:0 0 auto; background:' + (s.running ? 'var(--idot-orange); animation:d1msPulse 1.6s infinite;' : 'rgba(255,255,255,.4);'),\n      statusText: s.statusText,\n      sourceSel: s.sourceSel, setSource: this.setField('sourceSel'),\n\n      onStart: () => this.toggleStart(),\n      onLoadSample: () => this.loadSample(),\n      onCopy: () => this.exportNotes(),\n      onExportJson: () => this.exportJson(),\n      onExportBrief: () => this.exportBrief(),\n      onOpenSettings: () => this.setState({ settingsOpen:true }),\n      onCoachNow: () => { if (!s.segments.length){ this.showToast('No discussion yet. Start listening or load the sample.'); return; } this.requestCoaching(); },\n\n      title: s.title, setTitle: this.setField('title'),\n      wordCountLabel: this.wordCount() + ' words',\n\n      transcriptEmpty: s.segments.length === 0,\n      segments: s.segments.map(seg => ({ speaker:seg.speaker, text:seg.text, time:this.fmtTime(seg.ts), chipStyle:this.speakerChip(seg.source, seg.speaker) })),\n      showInterimMic: !!s.interim.mic, interimMic: s.interim.mic, curLabelMic: this.currentLabel('mic'),\n      showInterimTab: !!s.interim.tab, interimTab: s.interim.tab, curLabelTab: this.currentLabel('tab'),\n      chipYou: this.chip('#e8eef4', '#002341'), chipRemote: this.chip('#e3f3ee', '#0f6b57'),\n\n      insightsEmpty: s.insights.length === 0,\n      insights: s.insights.map(i => ({ time:i.time, text:i.text, dismiss: () => this.setState(st => ({ insights: st.insights.filter(x => x.id !== i.id) })) })),\n\n      settingsOpen: s.settingsOpen,\n      onBackdrop: () => this.setState({ settingsOpen:false }),\n      stop: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },\n      closeSettings: () => this.setState({ settingsOpen:false }),\n      onSaveSettings: () => this.saveSettings(),\n\n      provider: s.provider, setProvider: this.setField('provider'),\n      pGithub: p==='github', pM365: s.provider==='m365', pAnthropic: p==='anthropic', pAio: p==='aio',\n      hasProviderHint: (s.provider==='m365' && !m365Https) || p==='builtin',\n      providerHint: p==='builtin'\n        ? 'Uses this workspace\\u2019s built-in assistant. No key required. External providers below are for real deployments where transcript text must stay on your own infrastructure or licensed service.'\n        : (!m365Https ? 'Microsoft 365 Copilot needs this file hosted over https (for example on SharePoint). Ask IT. GitHub Copilot, Claude and self-hosted work from anywhere; the built-in assistant works in this workspace.' : ''),\n\n      ghToken: s.ghToken, setGhToken: this.setField('ghToken'),\n      model: s.model, setModel: this.setField('model'),\n      interval: s.interval, setInterval: this.setField('interval'),\n      m365Tenant: s.m365Tenant, setM365Tenant: this.setField('m365Tenant'),\n      m365Client: s.m365Client, setM365Client: this.setField('m365Client'),\n      onM365SignIn: () => this.m365SignIn(),\n      m365StatusText: this.m365Token() ? 'Signed in' : 'Not signed in',\n      anthropicKey: s.anthropicKey, setAnthropicKey: this.setField('anthropicKey'),\n      anthropicModel: s.anthropicModel, setAnthropicModel: this.setField('anthropicModel'),\n      aioBaseUrl: s.aioBaseUrl, setAioBaseUrl: this.setField('aioBaseUrl'),\n      aioKey: s.aioKey, setAioKey: this.setField('aioKey'),\n      aioModel: s.aioModel, setAioModel: this.setField('aioModel'),\n\n      historyEmpty: s.history.length === 0,\n      history: s.history.map(h => ({ label: h.title + ' (' + h.wordCount + ' words)', date: new Date(h.date).toLocaleDateString(), load: () => this.loadMeetingFromHistory(h) })),\n      onClearHistory: () => this.clearHistory(),\n\n      toastOn: !!s.toast, toastText: s.toast\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
